[phases.setup]
nixPkgs = [
  "php83",
  "php83Extensions.ctype",
  "php83Extensions.curl",
  "php83Extensions.fileinfo",
  "php83Extensions.gd",
  "php83Extensions.mbstring",
  "php83Extensions.openssl",
  "php83Extensions.pdo",
  "php83Extensions.pdo_mysql",
  "php83Extensions.tokenizer",
  "php83Extensions.xml",
  "php83Extensions.zip",
  "curl"
]
cmds = [
  "curl -sS https://getcomposer.org/installer | php -- --install-dir=/usr/local/bin --filename=composer"
]

[phases.install]
cmds = [
  "composer install --no-dev --optimize-autoloader --no-interaction"
]

[phases.build]
cmds = [
  "php artisan config:cache",
  "php artisan route:cache",
  "php artisan view:cache"
]

[start]
cmd = "php artisan migrate --force && php artisan storage:link && php -S 0.0.0.0:$PORT -t public"
